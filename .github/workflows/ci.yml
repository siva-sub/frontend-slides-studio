name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @slides-studio/export-service exec playwright install --with-deps chromium
      - run: sudo apt-get update && sudo apt-get install -y libreoffice poppler-utils
      - run: python -m pip install pillow python-pptx
      - run: pnpm check
      - run: pnpm smoke
